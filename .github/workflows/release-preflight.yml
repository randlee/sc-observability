name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version candidate (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      run_by_agent:
        description: "Must be 'publisher' (agent ownership assertion)"
        required: true
        default: "publisher"
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml
    steps:
      - name: Enforce publisher ownership input
        shell: bash
        run: |
          set -euo pipefail
          runner='${{ github.event.inputs.run_by_agent }}'
          if [[ "$runner" != "publisher" ]]; then
            echo "Preflight must be executed by publisher agent. Got run_by_agent='$runner'" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize version input
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ github.event.inputs.version }}'
          tag="$raw"
          [[ "$tag" == v* ]] || tag="v${tag}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$raw' (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Validate manifest completeness
        run: |
          python3 scripts/release_artifacts.py validate-manifest \
            --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
            --workspace-toml Cargo.toml

      - name: Validate publish_order dependency graph
        run: bash scripts/ci/validate_publish_order.sh

      - name: Validate version literals
        run: bash scripts/ci/validate_version_literals.sh

      - name: Validate repo boundaries
        run: bash scripts/ci/validate_repo_boundaries.sh

      - name: Verify requested version matches workspace
        run: |
          python3 scripts/release_artifacts.py verify-version \
            --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
            --workspace-toml Cargo.toml \
            --version '${{ steps.meta.outputs.release_version }}'

      - name: Detect initial standalone release mode
        id: initial_release
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            sc-observability-types
            sc-observability
            sc-observe
            sc-observability-otlp
          )
          present=()
          absent=()
          for crate in "${crates[@]}"; do
            url="https://crates.io/api/v1/crates/${crate}"
            response_path="${RUNNER_TEMP}/${crate}.json"
            status="$(curl --silent --show-error --location --output "$response_path" --write-out '%{http_code}' "$url")"
            case "$status" in
              200)
                present+=("$crate")
                ;;
              404)
                absent+=("$crate")
                ;;
              *)
                echo "Failed to determine crates.io state for ${crate} (HTTP $status)." >&2
                exit 1
                ;;
            esac
          done

          if [[ ${#absent[@]} -eq ${#crates[@]} ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "All publish-order crates are absent on crates.io; using initial-release dry-run preflight."
          elif [[ ${#present[@]} -eq ${#crates[@]} ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "All publish-order crates already exist on crates.io; using cargo package preflight."
          else
            echo "Mixed crates.io state detected. Present: ${present[*]:-<none>}. Absent: ${absent[*]:-<none>}." >&2
            echo "Initial-release dry-run mode is allowed only when all 4 crates are absent; normal package mode is allowed only when all 4 crates are present." >&2
            exit 1
          fi

      - name: Run dependency-aware publish preflight checks
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r package _; do
            if [[ '${{ steps.initial_release.outputs.enabled }}' == 'true' ]]; then
              # Initial standalone publish must use --no-verify because path
              # deps are not yet on crates.io; correctness is covered by the
              # preceding fmt/clippy/test/package-preflight validation steps,
              # and this path must NOT be used outside the all-crates-absent
              # initial-release case detected above.
              cargo publish -p "$package" --dry-run --locked --no-verify
            else
              cargo package -p "$package" --locked --allow-dirty
            fi
          done < <(python3 scripts/release_artifacts.py list-publish-plan --manifest "${RELEASE_ARTIFACT_MANIFEST}")
