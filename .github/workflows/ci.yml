name: CI

on:
  pull_request:
    branches: [develop, main, "integrate/*"]
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-clippy-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-clippy-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs-consistency:
    name: docs-consistency (ubuntu)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docs consistency
        run: bash scripts/ci/validate_docs_consistency.sh

  dependency-bans:
    name: dependency-bans (ubuntu)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dependency bans
        run: bash scripts/ci/validate_dependency_bans.sh

  version-literals:
    name: version-literals (ubuntu)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version literals
        run: bash scripts/ci/validate_version_literals.sh

  manifest-validation:
    name: manifest-validation (ubuntu)
    needs: [clippy, docs-consistency, dependency-bans, version-literals]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate manifest completeness
        run: |
          python3 scripts/release_artifacts.py validate-manifest \
            --manifest release/publish-artifacts.toml \
            --workspace-toml Cargo.toml

      - name: Validate publish_order dependency graph
        run: bash scripts/ci/validate_publish_order.sh

      - name: Validate docs consistency
        run: bash scripts/ci/validate_docs_consistency.sh

      - name: Validate dependency bans
        run: bash scripts/ci/validate_dependency_bans.sh

      - name: Validate version literals
        run: bash scripts/ci/validate_version_literals.sh

      - name: Validate repo boundaries
        run: bash scripts/ci/validate_repo_boundaries.sh

  test:
    needs: [clippy, manifest-validation]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-test-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-test-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-test-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run workspace tests
        run: cargo test --workspace
