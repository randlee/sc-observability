name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify requested version matches workspace
        run: python3 scripts/release_artifacts.py verify-version --manifest release/publish-artifacts.toml --workspace-toml Cargo.toml --version "${{ github.event.inputs.version }}"
      - name: Publish crates in order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          while IFS='|' read -r package wait_secs; do
            cargo publish -p "$package" --locked
            if [[ "$wait_secs" != "0" ]]; then
              sleep "$wait_secs"
            fi
          done < <(python3 scripts/release_artifacts.py list-publish-plan --manifest release/publish-artifacts.toml)

